<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4F7FA" />
      <stop offset="100%" stop-color="#E8EEF4" />
    </linearGradient>
    <linearGradient id="depth" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#1E2A38" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <!-- Base gradient -->
  <rect width="1200" height="600" fill="url(#bg)" />

  <!-- Subtle horizontal rules (financial-institution cue) -->
  <g stroke="#1E2A38" stroke-width="0.5" opacity="0.05">
    <line x1="0" y1="100" x2="1200" y2="100" />
    <line x1="0" y1="200" x2="1200" y2="200" />
    <line x1="0" y1="300" x2="1200" y2="300" />
    <line x1="0" y1="400" x2="1200" y2="400" />
    <line x1="0" y1="500" x2="1200" y2="500" />
  </g>

  <!-- Soft vertical accent lines on the right -->
  <g stroke="#1E2A38" stroke-width="0.5" opacity="0.04">
    <line x1="900" y1="0" x2="900" y2="600" />
    <line x1="1000" y1="0" x2="1000" y2="600" />
    <line x1="1100" y1="0" x2="1100" y2="600" />
  </g>

  <!-- Geometric accents -->
  <rect x="980" y="90" width="80" height="80" fill="#C9A961" opacity="0.35" />
  <rect x="1080" y="170" width="40" height="40" fill="#1E2A38" opacity="0.12" />
  <circle cx="1080" cy="450" r="20" fill="#C9A961" opacity="0.25" />

  <!-- Depth overlay -->
  <rect width="1200" height="600" fill="url(#depth)" />
</svg>